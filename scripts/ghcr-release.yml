name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/ffgags13/smartstudy-rag-backend
  FRONTEND_IMAGE: ghcr.io/ffgags13/smartstudy-rag-frontend

jobs:
  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build SmartStudy-Setup.exe
        shell: pwsh
        run: |
          cd release
          pip install -r requirements-build.txt
          pyinstaller --onefile --console --name SmartStudy-Setup --distpath dist --workpath build --specpath build --clean installer.py
          Get-FileHash dist/SmartStudy-Setup.exe -Algorithm SHA256 | Format-List

      - uses: actions/upload-artifact@v4
        with:
          name: SmartStudy-Setup-exe
          path: release/dist/SmartStudy-Setup.exe

  build-docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/ffgags13/smartstudy-rag-backend
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            image: ghcr.io/ffgags13/smartstudy-rag-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.ref_name }}

  release:
    needs: [build-exe, build-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: SmartStudy-Setup-exe
          path: release/dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          name: SmartStudy RAG ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            release/dist/SmartStudy-Setup.exe
            docker-compose.pull.yml
            install-images.ps1
            scripts/SmartStudy-Setup.ps1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
